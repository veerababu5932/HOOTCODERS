<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torii Minds - Admin Backoffice Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <!-- Top Admin Header Bar -->
    <header class="bg-slate-950 border-b border-slate-800 py-6 px-8 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <span class="text-xs font-mono font-bold uppercase tracking-widest text-red-500 block mb-1">Central Matrix Scope</span>
                <h1 class="text-2xl font-extrabold tracking-tight text-white flex items-center gap-2">⛩️ TORIIMINDS <span class="text-slate-500 font-light font-mono text-sm">/ Admin Backoffice</span></h1>
            </div>
            <div class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl text-xs font-mono text-slate-400">
                Database Stack: <span class="text-emerald-400 font-bold animate-pulse">● Live Syncing</span>
            </div>
        </div>
    </header>

    <!-- Content Workspace -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8">
            <h2 class="text-lg font-bold text-white">Registered Trainees Registry</h2>
            <p class="text-xs text-slate-400 mt-1">Accept and change user verification states instantly.</p>
        </div>

        <!-- Dynamic User Grid List Output Layout Container -->
        <div id="admin-users-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-16 text-slate-500 font-mono text-sm">
                <i class="fa-solid fa-circle-notch animate-spin text-xl text-red-500 mb-3 block mx-auto"></i> 
                Connecting to Firebase Data Nodes Stack...
            </div>
        </div>
    </main>

    <!-- Firebase Script Logic Matrix Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Config updated to match your exact configuration rules
        const firebaseConfig = {
            apiKey: "AIzaSyDRSv7X-cxaxvoE6UGPAy9DUFjAeLPFeGc",
            authDomain: "useasfriendshub.firebaseapp.com",
            databaseURL: "https://useasfriendshub-default-rtdb.firebaseio.com",
            projectId: "useasfriendshub",
            storageBucket: "useasfriendshub.firebasestorage.app",
            messagingSenderId: "673386892232",
            appId: "1:673386892232:web:09c8dc0ed93cfd79d58efd",
            measurementId: "G-2X2E9XTYY0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Continuous Real-Time List synchronization hook
        onValue(ref(db, 'users'), (snapshot) => {
            const grid = document.getElementById('admin-users-grid');
            if (snapshot.exists()) {
                const data = snapshot.val();
                grid.innerHTML = '';
                
                for (let uid in data) {
                    const u = data[uid];
                    const isVerified = u.status === 'verified';
                    
                    const card = document.createElement('div');
                    card.className = "bg-slate-950 border border-slate-800 p-6 rounded-2xl flex flex-col justify-between shadow-lg space-y-6 hover:border-slate-700 transition duration-300";
                    
                    card.innerHTML = `
                        <div class="space-y-4">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] uppercase font-mono px-2.5 py-1 rounded-md font-bold tracking-wider ${isVerified ? 'bg-emerald-950/80 text-emerald-400 border border-emerald-900/60' : 'bg-amber-950/80 text-amber-400 border border-amber-900/60'}">
                                    Status: ${u.status}
                                </span>
                                <span class="text-xs font-mono text-slate-500 bg-slate-900 px-2 py-0.5 rounded border border-slate-800">SUC: ${u.suc || 'N/A'}</span>
                            </div>
                            <div>
                                <h3 class="text-base font-bold text-white truncate">${u.name}</h3>
                                <p class="text-xs text-slate-400 font-mono truncate mt-0.5">${u.email}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-900 text-xs">
                                <div><p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Dept</p><p class="text-slate-300 font-medium truncate">${u.department || 'Unspecified'}</p></div>
                                <div><p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Phone</p><p class="text-slate-300 font-medium truncate">${u.phone || 'N/A'}</p></div>
                            </div>
                        </div>
                        <div>
                            ${!isVerified ? `
                                <button onclick="adminApproveUser('${uid}')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 rounded-xl transition duration-200 shadow-md shadow-emerald-900/20">
                                    <i class="fa-solid fa-check mr-1.5"></i> Accept & Verify User
                                </button>
                            ` : `
                                <div class="w-full bg-slate-900 border border-slate-800 text-center text-slate-400 font-semibold text-xs py-2.5 rounded-xl flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-circle-check text-emerald-500"></i> Verified Account
                                </div>
                            `}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            } else {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-slate-950 border border-slate-800 rounded-3xl text-slate-500 font-mono text-xs">
                        No active user entries found inside current database cluster references.
                    </div>`;
            }
        });

        window.adminApproveUser = async (uid) => {
            try {
                await update(ref(db, `users/${uid}`), { status: 'verified' });
            } catch (error) {
                alert("Database Sync Error: " + error.message);
            }
        };
    </script>
</body>
</html>
