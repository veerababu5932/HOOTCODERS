<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOT CODERS - Gateway to Tech Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .hidden-view {
            display: none !important;
        }
        @keyframes scaleIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-scale {
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .perspective-container {
            perspective: 1000px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card-inner.is-flipped {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1rem;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }

        .owl-particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 1.8rem;
            animation: flyAwaySlower 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            filter: drop-shadow(0 4px 12px rgba(251, 146, 60, 0.4));
        }
        @keyframes flyAwaySlower {
            0% { transform: translate(-50%, -50%) scale(0.3) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            70% { opacity: 0.7; }
            100% { transform: translate(var(--tw-tx), var(--tw-ty)) scale(1.8) rotate(var(--tw-rot)); opacity: 0; }
        }

        .owl-eyelid {
            position: absolute;
            background-color: #3b2314;
            border-radius: 50%;
            height: 0%;
            width: 58px;
            transition: height 0.12s ease-in-out;
            z-index: 20;
            border: 2px solid #1a0f0d;
        }
        .owl-container.is-blinking .owl-eyelid {
            height: 58px;
        }
        
        .secure-exam-zone {
            user-select: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
        }
    </style>
</head>
<body class="bg-[#0B0F1A] text-slate-100 antialiased">

    <header class="sticky top-0 z-50 bg-[#111827]/90 backdrop-blur-md border-b border-white/10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showView('landing')">
                <div class="h-10 w-10 bg-[#F15D49] flex items-center justify-center rounded-lg text-white font-bold text-xl tracking-tighter shadow-md shadow-[#F15D49]/20">🦉</div>
                <span class="text-2xl font-extrabold text-white tracking-tight">HOOT<span class="text-[#F15D49]">CODERS</span></span>
            </div>

            <nav class="hidden lg:flex items-center gap-8 font-semibold text-gray-300 text-sm">
                <a href="#" id="nav-wings-link" onclick="showView('landing')" class="text-[#F15D49] hover:text-[#D94E3B] transition">My Wings</a>
                <a href="#" id="nav-events-link" onclick="showView('events')" class="hover:text-[#F15D49] transition">EVENTS</a>
                <a href="#" id="nav-placements-link" onclick="showView('placements')" class="hover:text-[#F15D49] transition">PLACEMENTS</a>
            </nav>

            <div class="flex items-center gap-4">
                <div id="guest-actions" class="flex items-center gap-4">
                    <button onclick="openLoginModal()" class="text-sm font-semibold text-gray-200 hover:text-[#F15D49] transition">Login</button>
                    <button onclick="openRegisterModal()" class="bg-[#F15D49] hover:bg-[#D94E3B] text-white text-sm font-semibold px-5 py-2.5 rounded-xl shadow-lg transition-all">Register</button>
                </div>

                <div id="auth-actions" class="hidden-view relative">
                    <button onclick="toggleProfileDropdown()" class="h-10 w-10 bg-[#F15D49] text-white rounded-full flex items-center justify-center font-bold shadow-md hover:scale-105 transition focus:outline-none">
                        <span id="profile-initials">U</span>
                    </button>
                    <div id="profile-dropdown" class="hidden-view absolute right-0 mt-3 w-64 bg-[#111827] rounded-2xl border border-white/10 shadow-xl py-4 z-50">
                        <div class="px-4 pb-3 border-b border-white/5">
                            <p class="text-xs text-gray-400 font-medium">Signed in as</p>
                            <p id="dropdown-name" class="font-bold text-white truncate text-sm"></p>
                            <p id="dropdown-email" class="text-xs text-gray-400 truncate mb-2"></p>
                        </div>
                        <div class="px-2 pt-2">
                            <button onclick="logoutUser()" class="w-full text-left px-3 py-2 text-xs text-[#F15D49] hover:bg-[#F15D49]/10 rounded-lg transition font-bold mt-1">
                                <i class="fa-solid fa-right-from-bracket mr-2 opacity-70"></i> Secure Logout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="view-landing">
        <section class="relative overflow-hidden pt-16 pb-20 lg:pt-24 lg:pb-28 bg-[#0B0F1A]">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid lg:grid-cols-2 gap-12 items-center">
                <div data-aos="fade-right" data-aos-duration="1000">
                    <div class="inline-flex items-center gap-2 bg-[#F15D49]/10 text-[#F15D49] px-3 py-1.5 rounded-full text-xs font-semibold mb-6 border border-[#F15D49]/20">
                        <span class="flex h-2 w-2 rounded-full bg-[#F15D49] animate-pulse"></span> The Gateway to Tech Excellence
                    </div>
                    <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-white tracking-tight leading-tight mb-6">
                        Code Wise Fly High. <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-[#F15D49] to-orange-400">with HOOT</span>
                    </h1>
                    <p class="text-gray-400 text-lg leading-relaxed mb-8 max-w-xl">
                        Inspired by the wisdom of the owl, Hoot Coders empowers learners to code with confidence and fly high.
                    </p>
                </div>
                <div class="relative lg:ml-4 flex justify-center items-center select-none" data-aos="fade-left" data-aos-duration="1000">
                    <div id="interactive-owl-node" onclick="triggerOwlHootEffects()" class="owl-container relative w-full max-w-[450px] transform hover:scale-[1.03] transition duration-500 cursor-pointer">
                        <div class="owl-eyelid top-[108px] left-[163px]"></div>
                        <div class="owl-eyelid top-[108px] left-[229px]"></div>
                        <img src="https://file.garden/alSdpaXzClCO76yf/Jul%2013%2C%202026%2C%2012_20_55%20PM%20(1).png" alt="Hoot Coders Logo" class="w-full h-auto object-contain rounded-2xl"/>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <main id="view-events" class="hidden-view max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="mb-12 text-center"><h2 class="text-3xl font-extrabold tracking-tight text-white">Upcoming Events</h2></div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="perspective-container h-[420px] w-full" onclick="toggleCardFlip('event-card-inner-1')">
                <div id="event-card-inner-1" class="flip-card-inner w-full h-full">
                    <div class="flip-card-front rounded-2xl overflow-hidden flex flex-col justify-end shadow-2xl relative border-2 border-[#F15D49] bg-[#0F1322]">
                        <img src="https://file.garden/alSdpaXzClCO76yf/typing.PNG" class="w-full h-full object-cover absolute inset-0 opacity-40" />
                        <div class="relative z-10 p-6 w-full">
                            <button onclick="handleRegisterTrigger(event, 'Owl Code Sprint 2026')" class="w-full bg-[#F15D49] text-white font-bold text-xs py-3.5 rounded-xl transition">Register for Event</button>
                        </div>
                    </div>
                    <div class="flip-card-back bg-slate-950 p-8 flex flex-col justify-between border-2 border-[#F15D49]">
                        <p class="text-xs text-slate-400">High intensity full stack performance sprint tracks.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="view-placements" class="hidden-view max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="text-center py-12"><i class="fa-solid fa-spinner animate-spin text-2xl text-[#F15D49]"></i></div>
    </main>

    <div id="modal-overlay" class="hidden-view fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDRSv7X-cxaxvoE6UGPAy9DUFjAeLPFeGc",
            authDomain: "useasfriendshub.firebaseapp.com",
            databaseURL: "https://useasfriendshub-default-rtdb.firebaseio.com",
            projectId: "useasfriendshub"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let availableExamsCache = {};
        let activeExamId = null;
        let testCountdownInterval = null;
        let activeSecondsRemaining = 0;
        let isExamActiveNow = false;

        // ASYNCHRONICALLY BIND THE PLACEMENTS TEMPLATE TO COMPONENT TARGETS
        async function bootstrapPlacementsTemplateEngine() {
            try {
                const response = await fetch('placements.html');
                if (response.ok) {
                    document.getElementById('view-placements').innerHTML = await response.text();
                    attachFirebaseLiveAptitudeSync();
                }
            } catch (err) { console.error("Template injection fault: ", err); }
        }

        function attachFirebaseLiveAptitudeSync() {
            onValue(ref(db, 'aptitude_exams'), (snapshot) => {
                const container = document.getElementById('live-exams-list-container');
                if (!container) return;
                if (snapshot.exists()) {
                    availableExamsCache = snapshot.val();
                    container.innerHTML = '';
                    for (let examId in availableExamsCache) {
                        const exam = availableExamsCache[examId];
                        const qCount = exam.questions ? exam.questions.length : 0;
                        const btn = document.createElement('button');
                        btn.className = "w-full text-left bg-[#0B0F1A] border border-white/5 hover:border-[#F15D49] rounded-xl p-3 flex justify-between items-center group transition";
                        btn.onclick = () => launchTargetTest(examId);
                        btn.innerHTML = `<div><h5 class="text-xs font-bold text-slate-200">${exam.title}</h5><p class="text-[10px] text-gray-500">${qCount} Questions · ${exam.duration} Mins</p></div><i class="fa-solid fa-circle-play text-gray-600 group-hover:text-[#F15D49] text-sm"></i>`;
                        container.appendChild(btn);
                    }
                } else {
                    container.innerHTML = `<p class="text-xs text-slate-500 text-center py-4">No active quizzes hosted yet.</p>`;
                }
            });
        }

        window.showAptitudeTestList = () => {
            document.getElementById('aptitude-overview-panel').classList.add('hidden-view');
            document.getElementById('aptitude-test-live-panel').classList.add('hidden-view');
            document.getElementById('aptitude-score-panel').classList.add('hidden-view');
            document.getElementById('aptitude-test-list-panel').classList.remove('hidden-view');
        };

        window.backToAptitudeOverview = () => {
            disableExamSecurityListeners();
            document.getElementById('aptitude-test-list-panel').classList.add('hidden-view');
            document.getElementById('aptitude-test-live-panel').classList.add('hidden-view');
            document.getElementById('aptitude-score-panel').classList.add('hidden-view');
            document.getElementById('aptitude-overview-panel').classList.remove('hidden-view');
        };

        window.launchTargetTest = (examId) => {
            activeExamId = examId;
            const targetExam = availableExamsCache[examId];
            document.getElementById('aptitude-test-list-panel').classList.add('hidden-view');
            document.getElementById('live-test-title-node').innerText = targetExam.title;
            
            const questionBox = document.getElementById('live-questions-display-box');
            questionBox.innerHTML = '';
            
            if (targetExam.questions) {
                targetExam.questions.forEach((q, idx) => {
                    const qDiv = document.createElement('div');
                    qDiv.className = "bg-[#0B0F1A] rounded-xl p-4 border border-white/5 text-xs space-y-2";
                    qDiv.innerHTML = `
                        <p class="text-slate-300 font-medium">Q${idx+1}: ${q.text}</p>
                        <div class="space-y-1.5 pt-1">
                            <label class="flex items-center gap-2 p-1 rounded hover:bg-white/5 cursor-pointer text-[11px]"><input type="radio" name="ans-${idx}" value="A"> A: ${q.a}</label>
                            <label class="flex items-center gap-2 p-1 rounded hover:bg-white/5 cursor-pointer text-[11px]"><input type="radio" name="ans-${idx}" value="B"> B: ${q.b}</label>
                            <label class="flex items-center gap-2 p-1 rounded hover:bg-white/5 cursor-pointer text-[11px]"><input type="radio" name="ans-${idx}" value="C"> C: ${q.c}</label>
                            <label class="flex items-center gap-2 p-1 rounded hover:bg-white/5 cursor-pointer text-[11px]"><input type="radio" name="ans-${idx}" value="D"> D: ${q.d}</label>
                        </div>
                    `;
                    questionBox.appendChild(qDiv);
                });
            }

            enableExamSecurityListeners();
            clearInterval(testCountdownInterval);
            activeSecondsRemaining = parseInt(targetExam.duration || 10) * 60;
            
            testCountdownInterval = setInterval(() => {
                activeSecondsRemaining--;
                const mins = Math.floor(activeSecondsRemaining / 60).toString().padStart(2, '0');
                const secs = (activeSecondsRemaining % 60).toString().padStart(2, '0');
                document.getElementById('live-timer-node').innerText = `${mins}:${secs}`;
                if (activeSecondsRemaining <= 0) submitLiveTestExecution(false);
            }, 1000);

            document.getElementById('aptitude-test-live-panel').classList.remove('hidden-view');
        };

        window.submitLiveTestExecution = (wasCaughtCheating = false) => {
            clearInterval(testCountdownInterval);
            disableExamSecurityListeners();
            const targetExam = availableExamsCache[activeExamId];
            let finalScore = 0;

            if (wasCaughtCheating) {
                finalScore = 0;
                document.getElementById('score-icon-badge').className = "h-16 w-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center text-3xl shadow-inner";
                document.getElementById('score-icon-badge').innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i>`;
                document.getElementById('score-status-header').innerText = "Security Disconnect Violation";
                document.getElementById('score-status-desc').innerText = "Malpractice event identified (Window blur, tab switch, or copy-paste trace). Score forced to zero.";
            } else if (targetExam && targetExam.questions) {
                targetExam.questions.forEach((q, idx) => {
                    const checked = document.querySelector(`input[name="ans-${idx}"]:checked`);
                    if (checked && checked.value.trim().toUpperCase() === q.correct.trim().toUpperCase()) finalScore++;
                });
                document.getElementById('score-icon-badge').className = "h-16 w-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center text-3xl shadow-inner";
                document.getElementById('score-icon-badge').innerHTML = `<i class="fa-solid fa-square-poll-vertical"></i>`;
                document.getElementById('score-status-header').innerText = "Assessment Evaluated!";
                document.getElementById('score-status-desc').innerText = "Your verified matrix tracking execution score:";
            }

            document.getElementById('user-score-node').innerText = finalScore;
            document.getElementById('total-score-node').innerText = targetExam ? targetExam.questions.length : 0;
            document.getElementById('aptitude-test-live-panel').classList.add('hidden-view');
            document.getElementById('aptitude-score-panel').classList.remove('hidden-view');
        };

        // INTEGRATED RE-STABILIZED SECURITY PREVENTION SANDBOX RULES
        function preventDefaultsEngine(e) { e.preventDefault(); return false; }
        function handleVisibilityMalpracticeCheck() {
            if ((document.hidden || !document.hasFocus()) && isExamActiveNow) {
                submitLiveTestExecution(true);
            }
        }

        function enableExamSecurityListeners() {
            isExamActiveNow = true;
            const targetZone = document.getElementById('secure-aptitude-card-root');
            if (targetZone) {
                targetZone.addEventListener('contextmenu', preventDefaultsEngine);
                targetZone.addEventListener('copy', preventDefaultsEngine);
                targetZone.addEventListener('paste', preventDefaultsEngine);
                targetZone.addEventListener('cut', preventDefaultsEngine);
            }
            window.addEventListener('blur', handleVisibilityMalpracticeCheck);
            document.addEventListener('visibilitychange', handleVisibilityMalpracticeCheck);
        }

        function disableExamSecurityListeners() {
            isExamActiveNow = false;
            const targetZone = document.getElementById('secure-aptitude-card-root');
            if (targetZone) {
                targetZone.removeEventListener('contextmenu', preventDefaultsEngine);
                targetZone.removeEventListener('copy', preventDefaultsEngine);
                targetZone.removeEventListener('paste', preventDefaultsEngine);
                targetZone.removeEventListener('cut', preventDefaultsEngine);
            }
            window.removeEventListener('blur', handleVisibilityMalpracticeCheck);
            document.removeEventListener('visibilitychange', handleVisibilityMalpracticeCheck);
        }

        window.showView = (name) => {
            document.getElementById('view-landing').classList.add('hidden-view');
            document.getElementById('view-events').classList.add('hidden-view');
            document.getElementById('view-placements').classList.add('hidden-view');
            if (name === 'events') document.getElementById('view-events').classList.remove('hidden-view');
            else if (name === 'placements') { document.getElementById('view-placements').classList.remove('hidden-view'); backToAptitudeOverview(); }
            else document.getElementById('view-landing').classList.remove('hidden-view');
        };

        window.toggleCardFlip = (id) => { const card = document.getElementById(id); if(card) card.classList.toggle('is-flipped'); };
        
        // Initialize Placements Runtime Asynchronously
        bootstrapPlacementsTemplateEngine();
    </script>
</body>
</html>
